<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Солитер - Слова</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#1e272e;
color:white;
}

h1{
margin-top:20px;
}

#letters{
margin-top:40px;
}

.letter{
display:inline-block;
background:white;
color:black;
padding:15px 20px;
margin:5px;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

#word{
margin-top:20px;
font-size:30px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#info{
margin-top:15px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Солитер - Слова</h1>

<div id="info">
Уровень: <span id="level"></span> |
Время: <span id="time"></span>
</div>

<div id="letters"></div>

<div id="word">Слово: </div>

<button onclick="checkWord()">Проверить</button>

<script>

let levels = [
{letters:["К","О","Т","А","Р","С"], words:["КОТ","ТОК","РОТ"]},
{letters:["М","И","Р","А","К","Т"], words:["МИР","ТИР","РАК"]},
{letters:["С","Л","О","В","А","Р"], words:["СЛОВО","ВОР","РОС"]},
{letters:["Б","А","Н","К","А","Т"], words:["БАНК","ТАНК","БАТ"]},
{letters:["Г","О","Р","А","Д","С"], words:["ГОРА","ДАР","САД"]}
];

let level = localStorage.getItem("level");
if(level == null) level = 0;

let currentWord = "";

let time = 300;

function startTimer(){

setInterval(()=>{

time--;

let minutes = Math.floor(time/60);
let seconds = time%60;

document.getElementById("time").innerText =
minutes+":"+String(seconds).padStart(2,'0');

if(time<=0){
alert("Время вышло! Ты проиграл!");
location.reload();
}

},1000)

}

function loadLevel(){

document.getElementById("level").innerText = Number(level)+1;

let letters = levels[level].letters;

let container = document.getElementById("letters");
container.innerHTML="";

letters.forEach(letter=>{

let div = document.createElement("div");
div.className="letter";
div.innerText=letter;

div.onclick=()=>{
currentWord+=letter;
document.getElementById("word").innerText="Слово: "+currentWord;
}

container.appendChild(div);

})

}

function checkWord(){

let words = levels[level].words;

if(words.includes(currentWord)){

alert("Правильное слово!");

level++;

if(level >= levels.length){

alert("Ты прошёл всю игру!");

localStorage.setItem("level",0);

}else{

localStorage.setItem("level",level);

alert("Следующий уровень!");

loadLevel();

}

}else{

alert("Такого слова нет");

}

currentWord="";
document.getElementById("word").innerText="Слово:";

}

loadLevel();
startTimer();

</script>

</body>
</html>
