- курицу на сковороде
- макароны
- рис
- пюре с сосисками
- гречку

Можешь написать: "Как приготовить жареную картошку"`;

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function normalizeText(text) {
      return text
        .toLowerCase()
        .replace(/[.,!?;:()"]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function scoreRecipe(userText, recipe) {
      let score = 0;
      for (const keyword of recipe.keywords) {
        if (userText.includes(keyword)) {
          score += keyword.length;
        }
      }
      return score;
    }

    function findBestRecipe(userText) {
      let bestRecipe = null;
      let bestScore = 0;

      for (const recipe of recipes) {
        const score = scoreRecipe(userText, recipe);
        if (score > bestScore) {
          bestScore = score;
          bestRecipe = recipe;
        }
      }

      return bestRecipe;
    }

    function getResponse(rawText) {
      const text = normalizeText(rawText);

      if (text.includes("привет") || text.includes("здарова") || text.includes("салам") || text.includes("hello")) {
        return "Привет 👨‍🍳 Я Urbaev Helper! Напиши блюдо или продукт, и я постараюсь подсказать рецепт.";
      }

      if (text.includes("спасибо")) {
        return "Пожалуйста 😄 Если хочешь, можешь спросить ещё какой-нибудь рецепт.";
      }

      if (text.includes("завтрак")) {
        return breakfastIdeas;
      }

      if (text.includes("обед")) {
        return lunchIdeas;
      }

      if (text.includes("ужин")) {
        return dinnerIdeas;
      }

      if (text.includes("что приготовить быстро") || text.includes("быстро")) {
        return `⚡ Что можно приготовить быстро:

- яичницу
- омлет
- бутерброды
- гренки
- лапшу быстрого приготовления
- сосиски
- макароны

Например, спроси: "Как приготовить яичницу"`;
      }

      if (text.includes("что приготовить дешево") || text.includes("дешево")) {
        return `💸 Что приготовить дёшево:

- картошку
- макароны
- яйца
- гречку
- рис
- бутерброды
- суп без мяса

Например: "Как приготовить жареную картошку"`;
      }

      if (text.includes("что приготовить из курицы")) {
        return `🍗 Из курицы можно приготовить:

- курицу на сковороде
- курицу в духовке
- рис с курицей
- суп с курицей
- плов с курицей

Напиши: "Как приготовить курицу на сковороде"`;
      }

      if (text.includes("что приготовить из картошки")) {
        return `🥔 Из картошки можно приготовить:

- жареную картошку
- пюре
- суп
- картошку с луком
- картошку с курицей

Напиши: "Как приготовить пюре"`;
      }

      if (text.includes("что приготовить из яиц")) {
        return `🥚 Из яиц можно приготовить:

- омлет
- яичницу
- гренки
- яйца с луком
- блины

Напиши: "Как приготовить омлет"`;
      }

      if (text.includes("что приготовить")) {
        return `🍽 Вот идеи, что можно приготовить:

- макароны
- рис
- гречку
- омлет
- яичницу
- суп
- жареную картошку
- пельмени
- блины
- салат
- курицу

Напиши конкретнее, например: "Как приготовить рис"`;
      }

      const bestRecipe = findBestRecipe(text);
      if (bestRecipe) {
        return bestRecipe.text;
      }

      return generalAnswers[Math.floor(Math.random() * generalAnswers.length)];
    }

    function sendMessage() {
      const value = input.value.trim();
      if (!value) return;

      addMessage(value, "user");
      input.value = "";

      setTimeout(() => {
        addMessage(getResponse(value), "bot");
      }, 300);
    }

    function askPreset(text) {
      input.value = text;
      sendMessage();
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    addMessage(
      "Привет 👨‍🍳 Я Urbaev Helper!\n\nЯ могу подсказывать рецепты по обычным сообщениям.\nНапример:\n- Как приготовить макароны на кастрюле в воде\n- Как варить рис\n- Что приготовить на завтрак\n- Что сделать из картошки\n\nUrbaev Helper - Это ИИ, он может ошибатся",
      "bot"
    );
  </script>
