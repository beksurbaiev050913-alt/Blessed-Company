<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Beka Messenger</title>
</head>
<body>

<h2>💬 Beka Messenger</h2>

<input id="username" placeholder="Твой ник">
<button onclick="login()">Войти</button>

<hr>

<div id="users"></div>

<hr>

<div id="chat"></div>

<input id="message" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://luevkczhecwyngqaorgv.supabase.co",
  "sb_publishable_aKZA-Pe_V47u0L1jp6xA8g_ZP1UxMeQ"
);

let currentUser = null;
let currentChat = null;

async function login() {
  const username = document.getElementById("username").value;

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  currentUser = data;
  loadUsers();
}

async function loadUsers() {
  const { data } = await supabase
    .from("profiles")
    .select("*");

  const div = document.getElementById("users");
  div.innerHTML = "";

  data.forEach(user => {
    const btn = document.createElement("button");
    btn.innerText = user.username;
    btn.onclick = () => openChat(user.id);
    div.appendChild(btn);
  });
}

function openChat(userId) {
  currentChat = userId;
  loadMessages();
}

async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*");

  const div = document.getElementById("chat");
  div.innerHTML = "";

  data.forEach(msg => {
    if (
      (msg.sender_id == currentUser.id && msg.receiver_id == currentChat) ||
      (msg.sender_id == currentChat && msg.receiver_id == currentUser.id)
    ) {
      const p = document.createElement("p");
      p.innerText = msg.text;
      div.appendChild(p);
    }
  });
}

async function sendMessage() {
  const text = document.getElementById("message").value;

  await supabase.from("messages").insert([
    {
      sender_id: currentUser.id,
      receiver_id: currentChat,
      text: text
    }
  ]);

  loadMessages();
}
</script>

</body>
</html>
